<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0f172a;
      }

      /* ── Scene container ── */
      .scene {
        position: absolute;
        inset: 0;
        width: 1080px;
        height: 1920px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 120px 80px;
        gap: 40px;
        overflow: hidden;
      }

      /* Scenes 2 and 3 start hidden — GSAP drives all reveal */
      #s2,
      #s3 {
        opacity: 0;
        filter: blur(20px);
      }

      /* ── Radial glow behind content ── */
      .bg-glow {
        position: absolute;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(201, 168, 76, 0.07) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      /* ── Scene 1: Arabic ayah ── */
      #s1-arabic {
        direction: rtl;
        text-align: center;
        font-family: "Amiri", Georgia, serif;
        font-size: 68px;
        line-height: 2.2;
        color: rgba(201, 168, 76, 0.85);
        word-break: break-word;
        overflow-wrap: anywhere;
        max-width: 900px;
      }

      #s1-ref {
        font-family: "Amiri", Georgia, serif;
        font-size: 26px;
        color: rgba(201, 168, 76, 0.45);
        letter-spacing: 0.06em;
      }

      /* ── Scene 2: English translation ── */
      #s2-translation {
        font-family: "Playfair Display", Georgia, serif;
        font-style: italic;
        font-size: 54px;
        line-height: 1.45;
        color: #f5f1e8;
        text-align: center;
        max-width: 860px;
      }

      #s2-ref {
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 300;
        font-size: 22px;
        color: rgba(201, 168, 76, 0.65);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      /* ── Scene 3: Brand ── */
      #s3-title {
        font-family: "Playfair Display", Georgia, serif;
        font-weight: 600;
        font-size: 100px;
        color: #f5f1e8;
        letter-spacing: 0.01em;
        text-align: center;
      }

      #s3-divider {
        width: 64px;
        height: 1px;
        background: rgba(201, 168, 76, 0.85);
      }

      #s3-tagline {
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 300;
        font-size: 24px;
        color: rgba(245, 241, 232, 0.6);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        text-align: center;
        max-width: 780px;
      }

      #s3-url {
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 300;
        font-size: 22px;
        color: rgba(201, 168, 76, 0.6);
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1080"
      data-height="1920"
    >
      <!-- Scene 1: Arabic Ayah -->
      <div id="s1" class="scene">
        <div class="bg-glow"></div>
        <div id="s1-arabic">أَفَلَا يَتَدَبَّرُونَ الْقُرْآنَ</div>
        <div id="s1-ref">— سورة محمد · ٤٧:٢٤ —</div>
      </div>

      <!-- Scene 2: English Translation -->
      <div id="s2" class="scene">
        <div id="s2-translation">
          "Do they not reflect upon the Quran?"
        </div>
        <div id="s2-ref">Muhammad · 47:24</div>
      </div>

      <!-- Scene 3: Brand -->
      <div id="s3" class="scene">
        <div id="s3-title">AyahGuide</div>
        <div id="s3-divider"></div>
        <div id="s3-tagline">Deep reflection on the Quran</div>
        <div id="s3-url">ayahguide.com</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // ── Scene 1: Arabic ayah entrance ──
      tl.from("#s1-arabic", { opacity: 0, y: 28, duration: 1.4, ease: "power2.out" }, 0.3);
      tl.from("#s1-ref", { opacity: 0, duration: 1.0, ease: "sine.out" }, 1.5);

      // ── Blur crossfade S1 → S2 at t=4.3 ──
      const T1 = 4.3;
      tl.to("#s1", { filter: "blur(24px)", scale: 1.03, opacity: 0, duration: 0.85, ease: "sine.inOut" }, T1);
      tl.fromTo(
        "#s2",
        { filter: "blur(24px)", scale: 0.97, opacity: 0 },
        { filter: "blur(0px)", scale: 1, opacity: 1, duration: 0.85, ease: "sine.inOut" },
        T1
      );

      // ── Scene 2: Translation entrance ──
      tl.from("#s2-translation", { opacity: 0, y: 20, duration: 1.1, ease: "power2.out" }, T1 + 0.35);
      tl.from("#s2-ref", { opacity: 0, y: 10, duration: 0.8, ease: "sine.out" }, T1 + 1.0);

      // ── Blur crossfade S2 → S3 at t=9.3 ──
      const T2 = 9.3;
      tl.to("#s2", { filter: "blur(24px)", scale: 1.03, opacity: 0, duration: 0.85, ease: "sine.inOut" }, T2);
      tl.fromTo(
        "#s3",
        { filter: "blur(24px)", scale: 0.97, opacity: 0 },
        { filter: "blur(0px)", scale: 1, opacity: 1, duration: 0.85, ease: "sine.inOut" },
        T2
      );

      // ── Scene 3: Brand reveal ──
      tl.from("#s3-title", { opacity: 0, y: 22, duration: 1.0, ease: "power3.out" }, T2 + 0.4);
      tl.from("#s3-divider", { scaleX: 0, opacity: 0, duration: 0.7, ease: "power2.inOut" }, T2 + 1.0);
      tl.from("#s3-tagline", { opacity: 0, y: 12, duration: 0.9, ease: "power2.out" }, T2 + 1.2);
      tl.from("#s3-url", { opacity: 0, duration: 0.8, ease: "sine.out" }, T2 + 1.8);

      // ── Final fade to black ──
      tl.to("#root", { opacity: 0, duration: 1.1, ease: "power1.in" }, 13.9);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
