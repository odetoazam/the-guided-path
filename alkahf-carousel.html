<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AyahGuide · Al-Kahf Carousel</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=Inter:wght@400;500;600&display=swap" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030810; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 0; }
    .slide-wrap { margin-bottom: 16px; }
    .slide-label { font-family: 'Inter', sans-serif; font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 3px; text-transform: uppercase; text-align: center; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ── Brand tokens ─────────────────────────────────────────────────────────
    const B = {
      bg:        "#0D1B2A",
      bgCard:    "#162F3D",
      bgLight:   "#1A3A4A",
      gold:      "#C9A84C",
      goldLight: "#DBBF6A",
      goldDark:  "#B8960C",
      cream:     "#F5F0E8",
      muted:     "#D8D0C4",
      dim:       "rgba(245,240,232,0.45)",
    };

    const R = {
      A: { main: "#C9A84C", bg: "rgba(201,168,76,0.11)",  border: "rgba(201,168,76,0.38)" },
      B: { main: "#6B9FAF", bg: "rgba(107,159,175,0.11)", border: "rgba(107,159,175,0.32)" },
      C: { main: "#82AF8A", bg: "rgba(130,175,138,0.16)", border: "rgba(130,175,138,0.65)" },
    };

    const W = 1080;
    const H = 1080;

    // ── Shared components ─────────────────────────────────────────────────────
    function Slide({ children, id }) {
      return (
        <div id={id} style={{
          width: W, height: H,
          background: B.bg,
          position: "relative",
          overflow: "hidden",
          display: "flex",
          flexDirection: "column",
          flexShrink: 0,
        }}>
          {/* Ambient top glow */}
          <div style={{
            position: "absolute", top: -120, left: "50%", transform: "translateX(-50%)",
            width: 800, height: 380,
            background: `radial-gradient(ellipse, ${B.gold}0C 0%, transparent 68%)`,
            pointerEvents: "none",
          }} />
          {children}
        </div>
      );
    }

    function SlideHeader({ slide, total }) {
      return (
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "40px 56px 0",
          zIndex: 1,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{ width: 4, height: 48, background: B.gold, borderRadius: 3 }} />
            <div>
              <div style={{ fontSize: 24, fontFamily: "'Amiri', serif", color: B.gold, lineHeight: 1.2 }}>
                سورة الكهف
              </div>
              <div style={{ fontSize: 14, fontFamily: "'Inter', sans-serif", color: B.muted, letterSpacing: 4, textTransform: "uppercase", marginTop: 2 }}>
                Surah Al-Kahf
              </div>
            </div>
          </div>
          <div style={{ fontSize: 16, fontFamily: "'Inter', sans-serif", color: "rgba(245,240,232,0.22)", letterSpacing: 2 }}>
            {slide} / {total}
          </div>
        </div>
      );
    }

    function SlideFooter({ cta = false }) {
      return (
        <div style={{
          padding: "0 56px 38px",
          display: "flex", alignItems: "center",
          justifyContent: cta ? "space-between" : "flex-end",
          zIndex: 1,
        }}>
          {cta ? (
            <>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ fontSize: 15, fontFamily: "'Inter', sans-serif", color: B.dim, letterSpacing: 2 }}>swipe</div>
                <div style={{ fontSize: 20, color: B.dim }}>›</div>
              </div>
              <div style={{
                fontSize: 16, fontFamily: "'Inter', sans-serif",
                color: B.gold, letterSpacing: 2,
                border: `1px solid ${B.gold}55`, borderRadius: 40,
                padding: "8px 24px",
              }}>
                ayahguide.com
              </div>
            </>
          ) : (
            <div style={{ fontSize: 14, fontFamily: "'Inter', sans-serif", color: "rgba(201,168,76,0.4)", letterSpacing: 4, textTransform: "uppercase" }}>
              ayahguide.com
            </div>
          )}
        </div>
      );
    }

    // ── Slide 1: Hook ─────────────────────────────────────────────────────────
    function Slide1() {
      return (
        <Slide id="slide-1">
          <SlideHeader slide={1} total={5} />
          <div style={{
            flex: 1, display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center",
            padding: "0 80px", textAlign: "center", zIndex: 1,
          }}>
            {/* Large Arabic */}
            <div style={{
              fontSize: 108,
              fontFamily: "'Amiri', serif",
              color: B.gold,
              lineHeight: 1.3,
              marginBottom: 48,
              letterSpacing: 4,
            }}>
              سورة الكهف
            </div>

            {/* Divider */}
            <div style={{ display: "flex", alignItems: "center", gap: 18, marginBottom: 56, width: "80%" }}>
              <div style={{ flex: 1, height: 1, background: `${B.gold}28` }} />
              <div style={{ width: 7, height: 7, borderRadius: "50%", background: B.gold, opacity: 0.5 }} />
              <div style={{ flex: 1, height: 1, background: `${B.gold}28` }} />
            </div>

            {/* Hook */}
            <div style={{
              fontSize: 56,
              fontFamily: "'Playfair Display', Georgia, serif",
              color: B.cream,
              lineHeight: 1.3,
              marginBottom: 28,
              fontStyle: "italic",
            }}>
              Al-Kahf isn't five random stories.
            </div>

            {/* Payoff */}
            <div style={{
              fontSize: 72,
              fontFamily: "'Playfair Display', Georgia, serif",
              fontWeight: "700",
              lineHeight: 1.15,
              background: `linear-gradient(135deg, ${B.goldLight} 0%, ${B.goldDark} 100%)`,
              WebkitBackgroundClip: "text",
              WebkitTextFillColor: "transparent",
              marginBottom: 36,
            }}>
              It's a ring.
            </div>

            {/* Sub */}
            <div style={{
              fontSize: 26,
              fontFamily: "'Source Serif 4', Georgia, serif",
              color: B.dim,
              lineHeight: 1.75,
              maxWidth: 680,
            }}>
              And every ring has a center — one story placed at the exact middle for a reason.
            </div>
          </div>

          {/* Pagination dots */}
          <div style={{
            position: "absolute", bottom: 100, left: "50%", transform: "translateX(-50%)",
            display: "flex", alignItems: "center", gap: 10, zIndex: 1,
          }}>
            {[0,1,2,3,4].map(i => (
              <div key={i} style={{
                width: i === 0 ? 32 : 10, height: 10,
                borderRadius: 5,
                background: i === 0 ? B.gold : `${B.gold}30`,
              }} />
            ))}
          </div>

          <SlideFooter />
        </Slide>
      );
    }

    // ── Slide 2: The Ring Diagram ─────────────────────────────────────────────
    const ringRows = [
      { key: "A",  title: "People of the Cave",  arabic: "أصحاب الكهف",   trial: "Trial of Faith",     ayahs: "9–26",   color: R.A, pivot: false },
      { key: "B",  title: "The Two Gardens",     arabic: "صاحب الجنتين",  trial: "Trial of Wealth",    ayahs: "32–44",  color: R.B, pivot: false },
      { key: "C",  title: "Mūsā & Khiḍr",       arabic: "موسى والخضر",   trial: "Pivot: Knowledge",   ayahs: "60–82",  color: R.C, pivot: true  },
      { key: "B'", title: "Dhul-Qarnayn",        arabic: "ذو القرنين",    trial: "Trial of Power",     ayahs: "83–98",  color: R.B, pivot: false },
      { key: "A'", title: "Iblīs & the End",     arabic: "إبليس والآخرة", trial: "Trial of Faith",     ayahs: "99–110", color: R.A, pivot: false },
    ];
    const indents = [0, 40, 80, 40, 0];

    function Slide2() {
      return (
        <Slide id="slide-2">
          <SlideHeader slide={2} total={5} />

          <div style={{ padding: "28px 56px 0", zIndex: 1 }}>
            <div style={{ fontSize: 40, fontFamily: "'Playfair Display', serif", color: B.cream, marginBottom: 6 }}>
              The Architecture
            </div>
            <div style={{ fontSize: 20, fontFamily: "'Inter', sans-serif", color: B.dim, letterSpacing: 0.5 }}>
              Five sections · three mirror pairs · one pivot
            </div>
          </div>

          <div style={{
            flex: 1, display: "flex", flexDirection: "column",
            justifyContent: "center", gap: 12,
            padding: "20px 56px", zIndex: 1,
          }}>
            {ringRows.map((row, i) => (
              <div key={row.key} style={{
                marginLeft: indents[i], marginRight: indents[i],
                display: "flex", alignItems: "stretch", gap: 14,
              }}>
                {/* Badge */}
                <div style={{
                  width: 56, minWidth: 56,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  borderRadius: 8,
                  background: row.pivot ? row.color.main : "transparent",
                  border: `2px solid ${row.color.border}`,
                }}>
                  <span style={{
                    fontSize: 18, fontWeight: "bold",
                    color: row.pivot ? B.bg : row.color.main,
                    fontFamily: "'Inter', sans-serif",
                  }}>{row.key}</span>
                </div>

                {/* Row body */}
                <div style={{
                  flex: 1,
                  background: row.color.bg,
                  border: `1px solid ${row.color.border}`,
                  borderRadius: 12,
                  padding: row.pivot ? "18px 26px" : "14px 26px",
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                }}>
                  <div>
                    <div style={{
                      fontSize: row.pivot ? 26 : 22,
                      fontWeight: row.pivot ? "600" : "normal",
                      fontFamily: "'Playfair Display', serif",
                      color: row.pivot ? B.cream : "rgba(245,240,232,0.85)",
                      marginBottom: 4,
                    }}>
                      {row.title}
                    </div>
                    <div style={{
                      fontSize: 14, fontFamily: "'Inter', sans-serif",
                      color: row.color.main, letterSpacing: 1.5, textTransform: "uppercase",
                    }}>
                      {row.trial}
                    </div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{
                      fontSize: 28, fontFamily: "'Amiri', serif",
                      color: `${row.color.main}88`, lineHeight: 1.5,
                    }}>
                      {row.arabic}
                    </div>
                    <div style={{ fontSize: 14, fontFamily: "'Inter', sans-serif", color: "rgba(245,240,232,0.22)", marginTop: 2 }}>
                      {row.ayahs}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          <SlideFooter cta />
        </Slide>
      );
    }

    // ── Slide 3: The Mirrors ──────────────────────────────────────────────────
    function MirrorPair({ leftKey, rightKey, leftTitle, rightTitle, arabic1, arabic2, insight, color }) {
      return (
        <div style={{
          background: `${color}0B`, border: `1px solid ${color}28`,
          borderRadius: 18, padding: "26px 30px",
        }}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 16, marginBottom: 16 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontFamily: "'Inter', sans-serif", color: `${color}CC`, letterSpacing: 2.5, textTransform: "uppercase", marginBottom: 6 }}>
                {leftKey}
              </div>
              <div style={{ fontSize: 24, fontFamily: "'Playfair Display', serif", color: B.cream, lineHeight: 1.3 }}>
                {leftTitle}
              </div>
              <div style={{ fontSize: 22, fontFamily: "'Amiri', serif", color: `${color}77`, direction: "rtl", marginTop: 4 }}>
                {arabic1}
              </div>
            </div>

            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, padding: "8px 0" }}>
              <div style={{ fontSize: 22, color: `${color}55`, letterSpacing: -2 }}>⟵</div>
              <div style={{ width: 1, height: 32, background: `${color}30` }} />
              <div style={{ fontSize: 22, color: `${color}55`, letterSpacing: -2 }}>⟶</div>
            </div>

            <div style={{ flex: 1, textAlign: "right" }}>
              <div style={{ fontSize: 15, fontFamily: "'Inter', sans-serif", color: `${color}CC`, letterSpacing: 2.5, textTransform: "uppercase", marginBottom: 6 }}>
                {rightKey}
              </div>
              <div style={{ fontSize: 24, fontFamily: "'Playfair Display', serif", color: B.cream, lineHeight: 1.3 }}>
                {rightTitle}
              </div>
              <div style={{ fontSize: 22, fontFamily: "'Amiri', serif", color: `${color}77`, direction: "rtl", marginTop: 4 }}>
                {arabic2}
              </div>
            </div>
          </div>

          <div style={{
            borderTop: `1px solid ${color}1E`, paddingTop: 14,
            fontSize: 20, fontFamily: "'Source Serif 4', serif",
            color: B.dim, lineHeight: 1.7, fontStyle: "italic",
            textAlign: "center",
          }}>
            {insight}
          </div>
        </div>
      );
    }

    function Slide3() {
      return (
        <Slide id="slide-3">
          <SlideHeader slide={3} total={5} />

          <div style={{ padding: "28px 56px 0", zIndex: 1 }}>
            <div style={{ fontSize: 40, fontFamily: "'Playfair Display', serif", color: B.cream, marginBottom: 6 }}>
              The Mirrors
            </div>
            <div style={{ fontSize: 20, fontFamily: "'Inter', sans-serif", color: B.dim }}>
              Each pair shares a hidden question
            </div>
          </div>

          <div style={{
            flex: 1, display: "flex", flexDirection: "column",
            justifyContent: "center", gap: 22,
            padding: "28px 56px", zIndex: 1,
          }}>
            <MirrorPair
              leftKey="A" rightKey="A'"
              leftTitle="People of the Cave"
              rightTitle="Iblīs & the End"
              arabic1="أصحاب الكهف"
              arabic2="إبليس والآخرة"
              insight="Who will you remain loyal to when the world turns against you?"
              color={R.A.main}
            />
            <MirrorPair
              leftKey="B" rightKey="B'"
              leftTitle="The Two Gardens"
              rightTitle="Dhul-Qarnayn"
              arabic1="صاحب الجنتين"
              arabic2="ذو القرنين"
              insight="What will you do with what you've been given — wealth or power?"
              color={R.B.main}
            />

            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
              <div style={{ flex: 1, height: 1, background: `${R.C.main}22` }} />
              <div style={{
                fontSize: 15, fontFamily: "'Inter', sans-serif",
                color: R.C.main, letterSpacing: 2, textTransform: "uppercase", opacity: 0.75,
              }}>
                C · The Pivot · see next slide
              </div>
              <div style={{ flex: 1, height: 1, background: `${R.C.main}22` }} />
            </div>
          </div>

          <SlideFooter cta />
        </Slide>
      );
    }

    // ── Slide 4: The Pivot ────────────────────────────────────────────────────
    function Slide4() {
      return (
        <Slide id="slide-4">
          <SlideHeader slide={4} total={5} />

          <div style={{
            flex: 1, display: "flex", flexDirection: "column",
            justifyContent: "center", padding: "20px 64px",
            zIndex: 1, gap: 0,
          }}>
            {/* Badge */}
            <div style={{
              display: "inline-flex", alignSelf: "flex-start",
              alignItems: "center", gap: 10,
              background: `${R.C.main}16`, border: `1px solid ${R.C.border}`,
              borderRadius: 40, padding: "8px 22px", marginBottom: 28,
            }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: R.C.main }} />
              <span style={{ fontSize: 14, fontFamily: "'Inter', sans-serif", color: R.C.main, letterSpacing: 3, textTransform: "uppercase" }}>
                The Pivot · Section C
              </span>
            </div>

            {/* Arabic */}
            <div style={{
              fontSize: 72, fontFamily: "'Amiri', serif",
              color: R.C.main, lineHeight: 1.4, marginBottom: 6,
              direction: "rtl", textAlign: "left",
            }}>
              مُوسَىٰ وَالْخَضِر
            </div>

            <div style={{
              fontSize: 44, fontFamily: "'Playfair Display', serif",
              color: B.cream, marginBottom: 36, lineHeight: 1.25,
            }}>
              Mūsā & Khiḍr
            </div>

            {/* Quote */}
            <div style={{
              borderLeft: `4px solid ${R.C.main}`,
              paddingLeft: 28, marginBottom: 36,
            }}>
              <div style={{
                fontSize: 28, fontFamily: "'Amiri', serif",
                color: R.C.main, direction: "rtl", textAlign: "right",
                lineHeight: 1.9, marginBottom: 10,
              }}>
                إِنَّكَ لَن تَسْتَطِيعَ مَعِيَ صَبْرًا
              </div>
              <div style={{
                fontSize: 20, fontFamily: "'Source Serif 4', serif",
                color: B.dim, fontStyle: "italic", lineHeight: 1.7,
              }}>
                "You will not be able to have patience with me." — Khiḍr to Mūsā (18:67)
              </div>
            </div>

            {/* Insight */}
            <div style={{
              background: `${R.C.main}0C`, border: `1px solid ${R.C.main}20`,
              borderRadius: 18, padding: "26px 30px",
            }}>
              <div style={{
                fontSize: 23, fontFamily: "'Source Serif 4', serif",
                color: B.cream, lineHeight: 1.8,
              }}>
                The surah's center isn't about power or wealth. It's about{" "}
                <span style={{ color: R.C.main, fontStyle: "italic" }}>the limits of what you can understand.</span>
                {" "}Every trial surrounding it becomes bearable only when you surrender the need to explain it.
              </div>
            </div>
          </div>

          <SlideFooter cta />
        </Slide>
      );
    }

    // ── Slide 5: Why Friday ───────────────────────────────────────────────────
    function Slide5() {
      const trials = [
        { trial: "Faith",     q: "Where is your loyalty when you stand alone?",    color: R.A.main },
        { trial: "Wealth",    q: "Are you grateful, or have you been deceived?",    color: R.B.main },
        { trial: "Knowledge", q: "Can you trust when you don't understand?",        color: R.C.main },
        { trial: "Power",     q: "What will you build with what you've been given?",color: R.B.main },
      ];

      return (
        <Slide id="slide-5">
          {/* Bottom ambient */}
          <div style={{
            position: "absolute", bottom: -60, left: "50%", transform: "translateX(-50%)",
            width: 900, height: 380,
            background: `radial-gradient(ellipse, ${B.gold}09 0%, transparent 68%)`,
            pointerEvents: "none",
          }} />

          <SlideHeader slide={5} total={5} />

          <div style={{
            flex: 1, display: "flex", flexDirection: "column",
            justifyContent: "center", padding: "20px 64px",
            zIndex: 1,
          }}>
            <div style={{
              fontSize: 15, fontFamily: "'Inter', sans-serif",
              color: B.muted, letterSpacing: 4, textTransform: "uppercase",
              marginBottom: 20,
            }}>
              Why We Read It Every Friday
            </div>

            <div style={{
              fontSize: 52, fontFamily: "'Playfair Display', serif",
              color: B.cream, lineHeight: 1.25, marginBottom: 42,
            }}>
              Al-Kahf is a weekly recalibration.
            </div>

            {/* Trials */}
            <div style={{ display: "flex", flexDirection: "column", gap: 18, marginBottom: 44 }}>
              {trials.map(({ trial, q, color }) => (
                <div key={trial} style={{ display: "flex", alignItems: "flex-start", gap: 18 }}>
                  <div style={{
                    width: 8, height: 8, borderRadius: "50%",
                    background: color, marginTop: 10, flexShrink: 0,
                  }} />
                  <div>
                    <span style={{
                      fontSize: 15, fontFamily: "'Inter', sans-serif",
                      color: color, fontWeight: "600",
                      textTransform: "uppercase", letterSpacing: 1.5,
                      marginRight: 10,
                    }}>
                      {trial}
                    </span>
                    <span style={{
                      fontSize: 22, fontFamily: "'Source Serif 4', serif",
                      color: B.dim, fontStyle: "italic",
                    }}>
                      {q}
                    </span>
                  </div>
                </div>
              ))}
            </div>

            {/* Closing */}
            <div style={{ borderLeft: `4px solid ${B.gold}`, paddingLeft: 28 }}>
              <div style={{
                fontSize: 26, fontFamily: "'Source Serif 4', serif",
                color: B.cream, lineHeight: 1.8, fontStyle: "italic",
              }}>
                The Quran isn't telling you a story from the past.
                It's preparing you for the one you're living now.
              </div>
            </div>
          </div>

          {/* CTA footer */}
          <div style={{
            padding: "0 64px 40px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            zIndex: 1,
          }}>
            <div style={{ fontSize: 19, fontFamily: "'Source Serif 4', serif", color: B.dim, fontStyle: "italic" }}>
              Explore the full tadabbur →
            </div>
            <div style={{
              fontSize: 18, fontFamily: "'Inter', sans-serif",
              color: B.gold, letterSpacing: 2.5,
              border: `1px solid ${B.gold}55`,
              borderRadius: 40, padding: "10px 28px",
            }}>
              ayahguide.com
            </div>
          </div>
        </Slide>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
          <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, color: "rgba(255,255,255,0.2)", letterSpacing: 3, textTransform: "uppercase", marginBottom: 8 }}>
            AyahGuide · Al-Kahf Carousel · 1080 × 1080
          </div>
          {[1,2,3,4,5].map(n => (
            <div key={n} className="slide-wrap">
              <div className="slide-label">Slide {n} of 5</div>
              {n === 1 && <Slide1 />}
              {n === 2 && <Slide2 />}
              {n === 3 && <Slide3 />}
              {n === 4 && <Slide4 />}
              {n === 5 && <Slide5 />}
            </div>
          ))}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
